name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_IP }}:${{ secrets.REGISTRY_PORT }}
  IMAGE_NAME: honeybeepf-studio/honeybeepf-llm

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: honeybeepf-llm
          cache-on-failure: true

      - name: Check formatting
        working-directory: .
        run: cargo fmt --all -- --check

  build-and-test:
    name: Build (Rust) and sanity-check
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly with rust-src)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libelf-dev pkg-config build-essential \
            libclang-dev llvm-dev zlib1g-dev

      - name: Install bpf-linker (pinned)
        run: cargo install bpf-linker --version 0.9.15 --locked

      - name: Build eBPF
        working-directory: ./honeybeepf-llm-ebpf
        run: cargo build --release --target=bpfel-unknown-none -Z build-std=core

      - name: Build userspace
        working-directory: ./honeybeepf-llm
        run: cargo build --release

  docker:
    name: Build and publish Docker image
    needs: build-and-test
    # Only push on main branch merges, not on PRs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-dns --accept-routes

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Configure Docker for insecure registry
        run: |
          # Allow plain-HTTP push for dockerd (login step)
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries":["${{ secrets.REGISTRY_IP }}:${{ secrets.REGISTRY_PORT }}"]}' \
            | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Run buildkitd on the HOST network so it can reach the Tailscale tunnel
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."${{ secrets.REGISTRY_IP }}:${{ secrets.REGISTRY_PORT }}"]
              http = true
              insecure = true

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest tag on every main push
            type=raw,value=latest
            # short SHA tag for traceability
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "Images pushed to ${{ env.REGISTRY }}:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
