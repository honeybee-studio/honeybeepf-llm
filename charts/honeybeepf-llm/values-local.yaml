nameOverride: ""
fullnameOverride: ""

image:
  repository: "honeybeepf-llm"
  tag: "local"
  pullPolicy: IfNotPresent
imagePullSecrets: []
podAnnotations: {}

output:
  otlp:
    endpoint: "honeybeepf-otel-opentelemetry-collector.honeybeepf.svc.cluster.local:4317"
    collectorReleaseName: "honeybeepf-otel-collector"
    port: 4317
    protocol: "grpc"

serviceAccount:
  create: true
  annotations: {}
  name: ""

rustLog: "info"

builtinProbes:
  filesystem:
    file_access:
      enabled: true
      watched_paths:
        # SSH keys
        - "/root/.ssh/authorized_keys"
        - "/root/.ssh/id_rsa"
        - "/root/.ssh/id_ed25519"
        - "/home/ubuntu/.ssh/authorized_keys"
        - "/home/ubuntu/.ssh/id_rsa"
        - "/home/ubuntu/.ssh/id_ed25519"
        # DB credentials
        - "/etc/mysql/credentials.cnf"
        - "/var/lib/secrets/db-password"
        # API keys
        - "/etc/secrets/payment-api-key"
        # System sensitive
        - "/etc/shadow"
        - "/etc/environment"
        - "/etc/ssh/ssh_host_rsa_key"
        # Customer PII
        - "/data/exports/customer_pii.csv"
        - "/mnt/warehouse/users/personal_info.parquet"
        # proc environ
        - "/proc/1/environ"

  llm:
    enabled: true
    providers:
      - name: "mock-llm"
        hosts: ["mock-llm-server"]
        paths: ["/v1/chat/completions"]
        response:
          usage_path: "usage"
          prompt_tokens: "prompt_tokens"
          completion_tokens: "completion_tokens"
          model_path: "model"
        request_extractor: "messages"

  interval: 1000

  process_lifecycle:
    enabled: false

securityContext:
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    add:
      - BPF
      - NET_ADMIN
      - PERFMON
      - SYS_ADMIN
      - SYS_PTRACE

resources:
  limits:
    cpu: "1000m"
    memory: "1Gi"
  requests:
    cpu: "200m"
    memory: "512Mi"

nodeSelector:
  kubernetes.io/os: linux
tolerations: []

debug: false
